<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安琪时间管理大师 - 海报识别工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .time-display {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .main-content {
            padding: 30px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background-color: #f0f4ff;
        }

        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .camera-section {
            margin: 20px 0;
            text-align: center;
        }

        .camera-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .camera-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .camera-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .preview-section {
            margin: 25px 0;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin: 15px 0;
        }

        .process-btn {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 15px 0;
        }

        .process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .process-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
        }

        .event-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .event-date {
            font-weight: bold;
            color: #667eea;
            font-size: 1em;
        }

        .event-title {
            font-size: 1.1em;
            margin: 5px 0;
            color: #333;
        }

        .event-time {
            color: #666;
            font-size: 0.9em;
        }

        .download-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s ease;
            width: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(40, 167, 69, 0.3);
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .api-config {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .api-config h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .upload-area {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 安琪时间管理大师</h1>
            <p>拍照识别海报，自动生成日历事件</p>
            <div class="time-display" id="timeDisplay">
                📅 正在获取当前时间...
            </div>
        </div>

        <div class="main-content">
            <!-- API配置区域 -->
            <div class="api-config">
                <h4>🔧 API配置</h4>
                <div class="form-group">
                    <label for="apiKey">豆包API Key:</label>
                    <input type="password" id="apiKey" placeholder="请输入您的豆包API Key" value="376435b9-db7d-4780-8da3-94918ffc9b83">
                </div>
                <div class="form-group">
                    <label for="endpoint">接入点ID:</label>
                    <input type="text" id="endpoint" placeholder="请输入接入点ID" value="ep-20251013070932-vbntl">
                </div>
            </div>

            <!-- 文件上传区域 -->
            <div class="upload-section">
                <h3>📸 上传海报图片</h3>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击选择文件或拖拽图片到此处</div>
                    <div class="upload-hint">支持 JPG、PNG、GIF 格式</div>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <!-- 拍照区域 -->
            <div class="camera-section">
                <h3>📷 或直接拍照</h3>
                <button class="camera-btn" id="cameraBtn">📷 打开相机</button>
                <button class="camera-btn" id="captureBtn" style="display: none;">📸 拍照</button>
                <button class="camera-btn" id="closeCameraBtn" style="display: none;">❌ 关闭相机</button>
            </div>

            <!-- 预览区域 -->
            <div class="preview-section" id="previewSection" style="display: none;">
                <h3>🖼️ 图片预览</h3>
                <img id="previewImage" class="preview-image" alt="预览图片">
                <br>
                <button class="process-btn" id="processBtn">🚀 开始识别事件</button>
            </div>

            <!-- 加载状态 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在识别图片中的事件信息...</p>
            </div>

            <!-- 错误信息 -->
            <div class="error" id="errorMsg"></div>

            <!-- 成功信息 -->
            <div class="success" id="successMsg"></div>

            <!-- 结果区域 -->
            <div class="result-section" id="resultSection">
                <h3>📅 识别到的事件</h3>
                <div id="eventsList"></div>
                <button class="download-btn" id="downloadBtn">📥 下载ICS文件</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentImageData = null;
        let recognizedEvents = [];
        let currentTimeInfo = null;
        let video = null;
        let stream = null;

        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const cameraBtn = document.getElementById('cameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const closeCameraBtn = document.getElementById('closeCameraBtn');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const resultSection = document.getElementById('resultSection');
        const eventsList = document.getElementById('eventsList');
        const downloadBtn = document.getElementById('downloadBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const endpointInput = document.getElementById('endpoint');
        const timeDisplay = document.getElementById('timeDisplay');

        // 事件监听
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);

        // 相机功能
        cameraBtn.addEventListener('click', openCamera);
        captureBtn.addEventListener('click', capturePhoto);
        closeCameraBtn.addEventListener('click', closeCamera);

        // 处理按钮
        processBtn.addEventListener('click', processImage);
        downloadBtn.addEventListener('click', downloadICS);

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('安琪时间管理大师已加载完成！');
            updateTimeDisplay();
            // 每分钟更新一次时间
            setInterval(updateTimeDisplay, 60000);
        });

        // 更新时间显示
        async function updateTimeDisplay() {
            try {
                const timeInfo = await getCurrentTimeInfo();
                currentTimeInfo = timeInfo;
                
                const now = new Date(timeInfo.datetime);
                const timeString = now.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    timeZone: 'Asia/Shanghai'
                });
                
                timeDisplay.innerHTML = `📅 ${timeString}`;
            } catch (error) {
                console.error('获取时间失败:', error);
                const now = new Date();
                const timeString = now.toLocaleString('zh-CN');
                timeDisplay.innerHTML = `📅 ${timeString}`;
            }
        }

        // 获取当前时间信息
        async function getCurrentTimeInfo() {
            try {
                const response = await fetch('https://worldtimeapi.org/api/ip');
                const data = await response.json();
                return {
                    year: new Date(data.datetime).getFullYear(),
                    timezone: data.timezone,
                    datetime: data.datetime
                };
            } catch (error) {
                console.error('获取时间信息失败:', error);
                // 使用本地时间作为备选
                const now = new Date();
                return {
                    year: now.getFullYear(),
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    datetime: now.toISOString()
                };
            }
        }

        // 拖拽处理函数
        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请选择图片文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageData = e.target.result;
                previewImage.src = currentImageData;
                previewSection.style.display = 'block';
                hideMessages();
            };
            reader.readAsDataURL(file);
        }

        // 相机功能
        async function openCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.style.width = '100%';
                video.style.maxWidth = '300px';
                video.style.borderRadius = '10px';
                video.style.margin = '15px 0';
                video.autoplay = true;
                video.muted = true;
                
                const cameraSection = document.querySelector('.camera-section');
                cameraSection.appendChild(video);
                
                cameraBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                closeCameraBtn.style.display = 'inline-block';
                
            } catch (error) {
                showError('无法访问相机，请检查权限设置');
                console.error('Camera error:', error);
            }
        }

        function capturePhoto() {
            if (!video) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
            previewImage.src = currentImageData;
            previewSection.style.display = 'block';
            
            closeCamera();
            hideMessages();
        }

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (video) {
                video.remove();
                video = null;
            }
            
            cameraBtn.style.display = 'inline-block';
            captureBtn.style.display = 'none';
            closeCameraBtn.style.display = 'none';
        }

        // 处理图片识别
        async function processImage() {
            if (!currentImageData) {
                showError('请先上传或拍摄图片！');
                return;
            }

            const apiKey = apiKeyInput.value.trim();
            const endpoint = endpointInput.value.trim();

            if (!apiKey || !endpoint) {
                showError('请先配置API Key和接入点ID！');
                return;
            }

            showLoading();
            hideMessages();

            try {
                // 获取当前时间信息
                if (!currentTimeInfo) {
                    currentTimeInfo = await getCurrentTimeInfo();
                }
                
                // 构建系统提示词
                const systemPrompt = `你是一个专业的事件信息提取助手。请仔细分析图片中的海报内容，识别出所有的事件信息。

当前时间信息：
- 当前年份：${currentTimeInfo.year}
- 时区：${currentTimeInfo.timezone}
- 当前时间：${currentTimeInfo.datetime}

请将识别到的事件信息整理为以下JSON格式：
[
    {
        "date": "YYYY-MM-DD",
        "event": "事件标题",
        "startTime": "HH:MM",
        "endTime": "HH:MM",
        "location": "地点（如果有）",
        "description": "事件描述（如果有）"
    }
]

注意事项：
1. 如果图片中没有明确显示年份，请根据当前年份${currentTimeInfo.year}进行推断
2. 时间格式使用24小时制
3. 日期格式为YYYY-MM-DD
4. 如果只有日期没有具体时间，startTime和endTime可以设为"00:00"和"23:59"
5. 只返回JSON格式，不要包含其他文字说明
6. 如果没有识别到任何事件，返回空数组[]`;

                // 调用豆包API
                const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'x-is-encrypted': 'true'
                    },
                    body: JSON.stringify({
                        model: endpoint,
                        messages: [
                            {
                                role: 'system',
                                content: systemPrompt
                            },
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'image_url',
                                        image_url: {
                                            url: currentImageData
                                        }
                                    },
                                    {
                                        type: 'text',
                                        text: '请识别这张海报中的所有事件信息'
                                    }
                                ]
                            }
                        ],
                        temperature: 0.1,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) {
                    throw new Error(`API调用失败: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const content = data.choices[0].message.content;

                // 解析返回的JSON
                try {
                    recognizedEvents = JSON.parse(content);
                    if (!Array.isArray(recognizedEvents)) {
                        throw new Error('返回格式不正确');
                    }
                } catch (parseError) {
                    console.error('解析JSON失败:', content);
                    throw new Error('AI返回的内容格式不正确，请重试');
                }

                if (recognizedEvents.length === 0) {
                    showError('未识别到任何事件信息，请确保图片清晰且包含事件海报');
                } else {
                    displayEvents();
                    showSuccess(`成功识别到 ${recognizedEvents.length} 个事件！`);
                }

            } catch (error) {
                console.error('处理图片失败:', error);
                showError(`处理失败: ${error.message}`);
            } finally {
                hideLoading();
            }
        }

        // 显示识别到的事件
        function displayEvents() {
            eventsList.innerHTML = '';
            
            recognizedEvents.forEach((event, index) => {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'event-item';
                eventDiv.innerHTML = `
                    <div class="event-date">📅 ${event.date}</div>
                    <div class="event-title">🎉 ${event.event}</div>
                    <div class="event-time">⏰ ${event.startTime} - ${event.endTime}</div>
                    ${event.location ? `<div class="event-time">📍 ${event.location}</div>` : ''}
                    ${event.description ? `<div class="event-time">📝 ${event.description}</div>` : ''}
                `;
                eventsList.appendChild(eventDiv);
            });
            
            resultSection.style.display = 'block';
        }

        // 生成并下载ICS文件
        function downloadICS() {
            if (recognizedEvents.length === 0) {
                showError('没有可下载的事件！');
                return;
            }

            let icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//安琪时间管理大师//Event Generator 1.0//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:安琪时间管理大师生成的事件
X-WR-TIMEZONE:Asia/Shanghai
`;

            recognizedEvents.forEach((event, index) => {
                const startDateTime = `${event.date.replace(/-/g, '')}T${event.startTime.replace(':', '')}00`;
                const endDateTime = `${event.date.replace(/-/g, '')}T${event.endTime.replace(':', '')}00`;
                
                icsContent += `BEGIN:VEVENT
UID:${Date.now()}-${index}@anqi-time-manager.com
DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z
DTSTART:${startDateTime}
DTEND:${endDateTime}
SUMMARY:${event.event}
${event.location ? `LOCATION:${event.location}` : ''}
${event.description ? `DESCRIPTION:${event.description}` : ''}
STATUS:CONFIRMED
SEQUENCE:0
BEGIN:VALARM
TRIGGER:-PT15M
DESCRIPTION:活动提醒
ACTION:DISPLAY
END:VALARM
END:VEVENT
`;
            });

            icsContent += `END:VCALENDAR`;

            // 创建下载链接
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `安琪时间管理大师-事件-${new Date().toISOString().split('T')[0]}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showSuccess('ICS文件下载成功！可以导入到Google Calendar或其他日历应用中。');
        }

        // 工具函数
        function showLoading() {
            loading.style.display = 'block';
            processBtn.disabled = true;
        }

        function hideLoading() {
            loading.style.display = 'none';
            processBtn.disabled = false;
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }
    </script>
</body>
</html>
